<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Player - Frame Out</title>
    <style>
        body { font-family: sans-serif; background: #0f0f0f; color: #f1f1f1; display: flex; flex-direction: column; align-items: center; padding: 10px; margin: 0; }
        .wrapper { max-width: 860px; width: 95%; margin-top: 10px; }
        
        /* 動画エリア */
        #player-box { position: relative; width: 100%; padding-top: 56.25%; background: #000; border-radius: 8px 8px 0 0; overflow: hidden; }
        #player { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: auto; }

        /* 枠外操作バー (画像のようなデザイン) */
        .external-controls {
            background: #000; /* 真っ黒 */
            padding: 10px 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            border-radius: 0 0 8px 8px;
            border: 1px solid #333;
            border-top: none;
        }

        .btn-icon { background: none; border: none; color: white; cursor: pointer; font-size: 18px; padding: 5px; display: flex; align-items: center; justify-content: center; }
        .btn-icon:hover { color: #aaa; }

        .time-display { font-family: monospace; font-size: 14px; color: #ddd; min-width: 80px; }
        
        /* 疑似シークバー */
        .seek-container { flex-grow: 1; height: 40px; display: flex; align-items: center; position: relative; cursor: pointer; }
        .seek-bg { width: 100%; height: 4px; background: #333; border-radius: 2px; position: relative; }
        .seek-current { height: 100%; background: #f00; border-radius: 2px; width: 0%; position: absolute; }
        /* 以前作ったトリムバーもここに重ねられる */
        #trim-indicator { height: 100%; background: rgba(62, 166, 255, 0.5); position: absolute; z-index: 1; }

        /* 設定パネルなど */
        .panel { background: #1a1a1a; padding: 15px; border-radius: 12px; margin-top: 15px; border: 1px solid #333; }
        .nav-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin-top: 10px; }
        button { border: none; border-radius: 4px; cursor: pointer; font-weight: bold; background: #333; color: #ccc; padding: 8px; font-size: 11px; }
        .btn-main { background: #cc0000; color: white; }
    </style>
</head>
<body>

<div class="wrapper">
    <div style="display:flex; gap:8px; margin-bottom:10px;">
        <input type="text" id="v-url" style="flex:1; background:#2a2a2a; border:1px solid #333; color:white; padding:8px; border-radius:6px;" placeholder="URL...">
        <button class="btn-main" onclick="loadV()">LOAD</button>
    </div>

    <div id="player-box">
        <div id="player"></div>
    </div>
    
    <div class="external-controls">
        <button class="btn-icon" onclick="togglePlay()" title="再生/一時停止">⏯</button>
        <button class="btn-icon" onclick="step(-0.033)" title="1コマ戻る">◁</button>
        <button class="btn-icon" onclick="step(0.033)" title="1コマ進む">▷</button>
        
        <div class="time-display" id="current-time-display">00:00:00</div>
        
        <div class="seek-container" onclick="seekByBar(event)">
            <div class="seek-bg">
                <div id="trim-indicator"></div>
                <div class="seek-current" id="seek-progress"></div>
            </div>
        </div>

        <button class="btn-icon" title="セット" onclick="setT('start')">🚩</button>
    </div>

    <div class="panel">
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
            <div>開始: <input type="text" id="t-start" value="00:00:00" style="width:70px;"> <button onclick="jumpT('start')">GO</button></div>
            <div>終了: <input type="text" id="t-end" value="00:00:00" style="width:70px;"> <button onclick="jumpT('end')">GO</button></div>
        </div>
        <div class="nav-grid">
            <button onclick="sk(-60)">-1m</button><button onclick="sk(-30)">-30s</button><button onclick="sk(-10)">-10s</button><button onclick="sk(-5)">-5s</button><button onclick="sk(-3)">-3s</button>
            <button onclick="sk(60)">+1m</button><button onclick="sk(30)">+30s</button><button onclick="sk(10)">+10s</button><button onclick="sk(5)">+5s</button><button onclick="sk(3)">+3s</button>
        </div>
    </div>
</div>

<script>
    let p, loop;
    const tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    document.head.appendChild(tag);

    function fmt(s) {
        const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sec = Math.floor(s % 60);
        return [h, m, sec].map(v => v.toString().padStart(2, '0')).join(':');
    }

    function toSec(str) {
        const parts = str.split(':').map(Number);
        if (parts.length === 3) return parts[0] * 3600 + parts[1] * 60 + parts[2];
        return parts[0] || 0;
    }

    function onYouTubeIframeAPIReady() {
        const u = new URLSearchParams(window.location.search), v = u.get('v');
        if (v) init(v, u.get('s'), u.get('e'));
    }

    function init(vid, s=0, e=0) {
        if (p) p.destroy();
        p = new YT.Player('player', {
            videoId: vid,
            playerVars: { 'autoplay': 1, 'controls': 0, 'rel': 0 }, // controls:0 で公式バーを消す
            events: {
                'onReady': (ev) => {
                    if (s) ev.target.seekTo(s);
                    document.getElementById('t-start').value = fmt(s);
                    document.getElementById('t-end').value = fmt(e);
                    runMonitor();
                }
            }
        });
    }

    function loadV() {
        const reg = /^.*(youtu.be\/|v\/|watch\?v=|shorts\/|live\/)([^#\&\?]*).*/;
        const m = document.getElementById('v-url').value.match(reg);
        if (m) init(m[2]);
    }

    function togglePlay() {
        const s = p.getPlayerState();
        s == 1 ? p.pauseVideo() : p.playVideo();
    }

    function sk(s) { p.seekTo(p.getCurrentTime() + s, true); }
    function step(s) { p.pauseVideo(); p.seekTo(p.getCurrentTime() + s, true); }

    function runMonitor() {
        setInterval(() => {
            if (!p || typeof p.getCurrentTime !== 'function') return;
            const now = p.getCurrentTime();
            const total = p.getDuration();
            const s = toSec(document.getElementById('t-start').value);
            const e = toSec(document.getElementById('t-end').value);
            
            // UI更新
            document.getElementById('current-time-display').innerText = fmt(now);
            document.getElementById('seek-progress').style.width = (now / total * 100) + "%";
            
            // トリム表示更新
            const indicator = document.getElementById('trim-indicator');
            if (e > s) {
                indicator.style.left = (s / total * 100) + "%";
                indicator.style.width = ((e - s) / total * 100) + "%";
                if (now >= e || now < s - 1) p.seekTo(s);
            } else {
                indicator.style.width = "0%";
            }
        }, 500);
    }

    function seekByBar(ev) {
        const rect = ev.currentTarget.getBoundingClientRect();
        const pos = (ev.clientX - rect.left) / rect.width;
        p.seekTo(p.getDuration() * pos, true);
    }

    function setT(type) {
        document.getElementById('t-' + type).value = fmt(p.getCurrentTime());
    }

    function jumpT(type) {
        p.seekTo(toSec(document.getElementById('t-' + type).value), true);
    }
</script>
</body>
</html>
